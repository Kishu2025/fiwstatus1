<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>fiwstatus • liquid movie clips</title>
    <!-- Font Awesome 6 for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- liquid animated background blobs -->
    <div class="liquid-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
        <div class="blob blob4"></div>
    </div>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Hero / Portfolio Intro Section -->
        <header class="hero glass-panel">
            <h1 class="title">fiwstatus</h1>
            <div class="subtitle">cinematic fragments</div>
            <div class="movie-tag">
                <i class="fas fa-clapperboard"></i> movie clips • liquid vibes
            </div>

            <!-- Social Media Links with liquid hover effects -->
            <div class="social-grid">
                <a href="https://www.facebook.com/share/1akxRUEAro/" target="_blank" rel="noopener noreferrer" class="social-link facebook" data-platform="facebook">
                    <i class="fab fa-facebook-f"></i> 
                    <span>Facebook</span>
                </a>
                <a href="https://www.instagram.com/fiwstatus2026?igsh=MTdvZjBqMm13OG41aQ==" target="_blank" rel="noopener noreferrer" class="social-link instagram" data-platform="instagram">
                    <i class="fab fa-instagram"></i> 
                    <span>Instagram</span>
                </a>
                <a href="https://youtube.com/@fiwstatus?si=xf1UU8NHCclN7p-b" target="_blank" rel="noopener noreferrer" class="social-link youtube" data-platform="youtube">
                    <i class="fab fa-youtube"></i> 
                    <span>YouTube</span>
                </a>
            </div>
            <p class="hero-tagline">follow the liquid flow of movie clips</p>
        </header>

        <!-- Movie Clips Sharing Section -->
        <section class="clips-section">
            <h2 class="section-title" id="clips-heading">
                <i class="fas fa-film"></i> featured movie clips
            </h2>
            
            <div class="clips-grid" id="clips-grid">
                <!-- Clip cards will be dynamically generated by JavaScript -->
            </div>
        </section>

        <!-- Additional Portfolio Note -->
        <div class="glass-panel portfolio-note">
            <p class="note-text">
                <i class="fas fa-droplet droplet-icon"></i> 
                <span>movie clip sharing · liquid animation portfolio</span>
                <i class="fas fa-droplet droplet-icon"></i>
            </p>
            <p class="copyright">© <span id="current-year"></span> fiwstatus – connecting through cinema</p>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>crafted with liquid motion <i class="fas fa-heart heart-icon"></i> • github pages ready</p>
            <p class="interaction-hint" id="interaction-hint"></p>
        </footer>
    </div>

    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
